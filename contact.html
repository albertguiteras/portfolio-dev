      <header>

         <nav>

         </nav>
         <a class="boton-descarga" href="docs/cv.pdf" download="CV.pdf"
            >Descargar CV</a
         >

      <main>
         <h1 class="titulos">Construyamos algo juntos</h1>
         <p class="descripcion">
            Actualmente estoy abierto a nuevas oportunidades y proyectos.
            <br />Ya sea que tengas una pregunta o simplemente quieras saludar,
            ¡haré todo lo posible por responderte!
         </p>
         <section class="formulario-contacto">
            <form
               action="https://formsubmit.co/58f3ccb698864f8ecbdc6b5b30973793"
               method="POST"
            >
               <!-- <input type="hidden" name="_captcha" value="false" /> -->
               <input
                  type="hidden"
                  name="_next"
                  value="https://albertguiteras.github.io/portfolio-dev/"
               />

               <div class="grupo-formulario">
                  <label for="nombre">Nombre</label>
                  <input type="text" id="nombre" name="nombre" required />
               </div>
               <div class="grupo-formulario">
                  <label for="correo">Email</label>
                  <input type="email" id="correo" name="correo" required />
               </div>
               <div class="grupo-formulario">
                  <label for="mensaje">Mensaje</label>
                  <textarea
                     id="mensaje"
                     name="mensaje"
                     rows="5"
                     required
                  ></textarea>
               </div>
               <button type="submit" class="boton-primario">Enviar</button>
            </form>
         </section>
      </main>
